# Hooks run the tools from the project's environment (system language) so they share the exact
# versions pinned in pyproject and, for mypy, see the installed dependencies and their stubs.
# Install once with `pre-commit install`; run on demand with `pre-commit run --all-files`.
repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]

      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy src
        language: system
        pass_filenames: false
        files: ^(src/|pyproject\.toml$)
